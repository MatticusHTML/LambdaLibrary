<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Color Library</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: #050608;
    color: #e9eef6;
  }
  .screen {
    display: grid;
    grid-template-rows: auto auto auto 1fr;
    height: 100%;
    background:
      radial-gradient(ellipse 100% 60% at 50% -10%, rgba(30, 58, 95, 0.85) 0%, transparent 55%),
      radial-gradient(ellipse 80% 50% at 100% 100%, rgba(69, 210, 255, 0.06) 0%, transparent 50%),
      #050608;
    transition: background 0.25s ease;
  }
  .head {
    text-align: center;
    padding: 12px 16px 6px;
    border-bottom: 1px solid rgba(69, 210, 255, 0.12);
    background: rgba(8, 10, 14, 0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .head-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    margin-bottom: 8px;
    object-fit: cover;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
  }
  .head-icon[hidden] { display: none; }
  .controls[hidden],
  .grid[hidden] { display: none !important; }
  .head h1 {
    margin: 0;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.48em;
    color: var(--cl-accent, #45d2ff);
    text-shadow: 0 0 24px color-mix(in srgb, var(--cl-accent, #45d2ff) 40%, transparent);
  }
  .head p {
    margin: 6px 0 0;
    font-size: 10px;
    letter-spacing: 0.28em;
    color: var(--cl-muted, #6b7686);
  }
  .dlc-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    background: rgba(6, 8, 12, 0.92);
    align-items: center;
  }
  .dlc-label {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.2em;
    color: var(--cl-muted, #6b7686);
    margin-right: 4px;
  }
  .dlc-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 2px solid #2a3548;
    border-radius: 4px;
    background: rgba(14, 17, 24, 0.95);
    color: #9aa6b8;
    cursor: pointer;
    transition: border-color 0.12s, color 0.12s, box-shadow 0.12s, transform 0.08s;
  }
  .dlc-btn:hover { border-color: var(--cl-accent, #45d2ff); color: #fff; }
  .dlc-btn.on {
    border-color: var(--cl-highlight, #ffd54a);
    color: var(--cl-highlight, #ffd54a);
    box-shadow: 0 0 14px color-mix(in srgb, var(--cl-highlight, #ffd54a) 35%, transparent);
    transform: translateY(-1px);
  }
  .dlc-btn .dlc-icon {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .dlc-btn .badge {
    font-size: 8px;
    margin-left: 6px;
    padding: 1px 5px;
    border-radius: 3px;
    background: color-mix(in srgb, var(--cl-accent, #45d2ff) 25%, transparent);
    color: var(--cl-accent, #45d2ff);
    letter-spacing: 0.08em;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    background: rgba(9, 11, 16, 0.9);
  }
  .search {
    flex: 1 1 180px;
    min-width: 140px;
    padding: 9px 12px;
    border-radius: 6px;
    border: 1px solid #2a3d55;
    background: #0e1118;
    color: #e9eef6;
    font-size: 13px;
    outline: none;
  }
  .search:focus { border-color: var(--cl-accent, #45d2ff); }
  .search::placeholder { color: #6b7686; }
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    flex: 2 1 320px;
    max-height: 76px;
    overflow-y: auto;
  }
  .tab {
    padding: 6px 11px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    border: 1px solid #2a3d55;
    border-radius: 4px;
    background: rgba(20, 26, 38, 0.9);
    color: #9aa6b8;
    cursor: pointer;
    transition: border-color 0.12s, color 0.12s, box-shadow 0.12s;
  }
  .tab:hover { border-color: var(--cl-accent, #45d2ff); color: #fff; }
  .tab.on {
    border-color: var(--cl-highlight, #ffd54a);
    color: var(--cl-highlight, #ffd54a);
    box-shadow: 0 0 12px color-mix(in srgb, var(--cl-highlight, #ffd54a) 30%, transparent);
  }
  .main {
    display: grid;
    grid-template-columns: 1fr minmax(220px, 280px);
    min-height: 0;
    overflow: hidden;
  }
  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    .showcase { max-height: 220px; border-left: none; border-top: 2px solid #3a4a62; }
    .brand-row { flex-direction: column; align-items: stretch; }
    .brand-card { max-width: none; min-height: 200px; }
  }
  .roster {
    display: flex;
    flex-direction: column;
    min-height: 0;
    padding: 12px 14px 10px;
    background: rgba(4, 6, 10, 0.5);
    box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.45);
  }
  .roster-meta {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--cl-muted, #6b7686);
    margin-bottom: 14px;
    padding-bottom: 2px;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
    text-transform: uppercase;
  }
  .grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(56px, 1fr));
    gap: 8px;
    overflow-y: auto;
    padding: 16px 2px 8px;
    align-content: start;
  }
  .grid::-webkit-scrollbar { width: 8px; }
  .grid::-webkit-scrollbar-thumb { background: #2a3d55; border-radius: 4px; }
  .cell {
    aspect-ratio: 4 / 5;
    min-height: 68px;
    border: 2px solid #2a3548;
    border-radius: 6px;
    cursor: pointer;
    position: relative;
    padding: 0;
    background: transparent;
    transition: transform 0.1s, border-color 0.1s, box-shadow 0.12s;
    box-shadow: inset 0 -10px 18px rgba(0, 0, 0, 0.3);
  }
  .cell:hover {
    transform: translateY(-3px) scale(1.05);
    border-color: color-mix(in srgb, var(--cl-accent, #45d2ff) 75%, transparent);
    z-index: 2;
  }
  .cell.on {
    border-color: var(--cl-highlight, #ffd54a);
    box-shadow: 0 0 18px color-mix(in srgb, var(--cl-highlight, #ffd54a) 55%, transparent);
    transform: translateY(-4px) scale(1.08);
    z-index: 3;
  }
  .cell .lbl {
    position: absolute;
    bottom: 3px;
    left: 2px;
    right: 2px;
    font-size: 8px;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.1s;
    pointer-events: none;
  }
  .cell:hover .lbl, .cell.on .lbl { opacity: 1; }
  .brand-row {
    flex: 1;
    display: flex;
    gap: 12px;
    align-items: stretch;
    justify-content: center;
    padding: 8px 4px 12px;
    overflow-x: auto;
    overflow-y: auto;
    min-height: 0;
  }
  .brand-card {
    flex: 1 1 0;
    min-width: 100px;
    max-width: 180px;
    display: flex;
    flex-direction: column;
    border: none;
    background: transparent;
    cursor: pointer;
    padding: 0;
    text-align: left;
    transition: transform 0.12s;
  }
  .brand-card:hover { transform: translateY(-4px); }
  .brand-card.on .brand-swatch {
    outline: 3px solid var(--cl-highlight, #ffd54a);
    outline-offset: 3px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
  }
  .brand-role {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.22em;
    color: var(--cl-text, #e9eef6);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .brand-swatch {
    flex: 1;
    min-height: 280px;
    border-radius: 2px;
    position: relative;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    transition: outline 0.12s, box-shadow 0.12s;
  }
  .brand-swatch .corner-name {
    position: absolute;
    bottom: 10px;
    right: 8px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    max-width: 90%;
    text-align: right;
    line-height: 1.3;
    opacity: 0.85;
  }
  .brand-codes {
    margin-top: 10px;
    font-family: ui-monospace, monospace;
    font-size: 9px;
    line-height: 1.65;
    color: var(--cl-muted, #9aa6b8);
  }
  .brand-codes b { color: var(--cl-text, #e9eef6); font-weight: 700; }
  .showcase {
    display: flex;
    flex-direction: column;
    padding: 16px;
    background: linear-gradient(180deg, rgba(22, 28, 40, 0.98) 0%, rgba(8, 10, 14, 0.99) 100%);
    border-left: 2px solid #3a4a62;
    box-shadow: -8px 0 32px rgba(0, 0, 0, 0.4);
  }
  .showcase-tag {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--cl-highlight, #ffd54a);
    text-align: center;
    margin-bottom: 10px;
  }
  .hero {
    flex: 1;
    min-height: 120px;
    border-radius: 10px;
    border: 2px solid rgba(255, 255, 255, 0.12);
    box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.35);
    transition: background 0.15s;
  }
  .name {
    margin: 14px 0 6px;
    font-size: 18px;
    font-weight: 800;
    text-align: center;
    text-transform: capitalize;
    line-height: 1.2;
    color: var(--cl-text, #fff);
  }
  .family {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--cl-muted, #6b7686);
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .codes {
    font-family: ui-monospace, monospace;
    font-size: 11px;
    line-height: 1.75;
    color: #9aa6b8;
    background: #0a0d12;
    border: 1px solid #2a3548;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 12px;
    word-break: break-all;
  }
  .codes b { color: var(--cl-accent, #45d2ff); font-weight: 600; }
  .copy {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.14em;
    cursor: pointer;
    background: linear-gradient(180deg, var(--cl-accent, #45d2ff), color-mix(in srgb, var(--cl-accent, #45d2ff) 65%, #000));
    color: #04121b;
    transition: filter 0.12s, transform 0.08s;
  }
  .copy:hover { filter: brightness(1.1); }
  .copy:active { transform: scale(0.98); }
  .copy.ok { background: linear-gradient(180deg, #7dffb3, #2eaa6a); }
  .hint {
    margin-top: 10px;
    font-size: 9px;
    text-align: center;
    color: var(--cl-muted, #6b7686);
    letter-spacing: 0.06em;
  }
  .pack-source {
    font-size: 8px;
    text-align: center;
    color: var(--cl-muted, #6b7686);
    margin-top: 8px;
    line-height: 1.4;
    opacity: 0.85;
  }
  .type-fold {
    margin-bottom: 10px;
    border: 1px solid #2a3548;
    border-radius: 8px;
    background: #0a0d12;
    overflow: hidden;
  }
  .type-fold[hidden] { display: none; }
  .type-fold summary {
    padding: 10px 12px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cl-highlight, #ffd54a);
    cursor: pointer;
    list-style: none;
    user-select: none;
  }
  .type-fold summary::-webkit-details-marker { display: none; }
  .type-fold summary::after {
    content: "+";
    float: right;
    font-weight: 400;
    color: var(--cl-muted, #6b7686);
  }
  .type-fold[open] summary::after { content: "−"; }
  .type-body {
    padding: 0 12px 12px;
    max-height: 220px;
    overflow-y: auto;
  }
  .type-body::-webkit-scrollbar { width: 5px; }
  .type-body::-webkit-scrollbar-thumb { background: #2a3d55; border-radius: 3px; }
  .type-primary {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.06em;
    color: var(--cl-text, #fff);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .type-row {
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }
  .type-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .type-role {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--cl-accent, #45d2ff);
    margin-bottom: 4px;
  }
  .type-spec {
    font-family: ui-monospace, monospace;
    font-size: 9px;
    color: var(--cl-muted, #9aa6b8);
    margin-bottom: 6px;
    line-height: 1.45;
  }
  .type-sample {
    font-size: 15px;
    line-height: 1.2;
    color: var(--cl-text, #e9eef6);
    text-transform: uppercase;
    word-break: break-word;
  }
  .type-alts {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
  }
  .type-alts-label {
    font-size: 8px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--cl-muted, #6b7686);
    margin-bottom: 6px;
  }
  .type-alt {
    font-size: 9px;
    color: #9aa6b8;
    margin: 3px 0;
    font-family: ui-monospace, monospace;
  }
</style>
</head>
<body>
<div class="screen" id="screen">
  <header class="head">
    <img id="head-icon" class="head-icon" hidden alt="" />
    <h1 id="head-title">COLOR LIBRARY</h1>
    <p id="head-sub">SELECT YOUR SHADE</p>
  </header>
  <div class="dlc-bar" id="dlc-bar">
    <span class="dlc-label">PACK</span>
  </div>
  <div class="controls" id="controls">
    <input class="search" id="search" type="search" placeholder="Search name or hex..." autocomplete="off" />
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="main">
    <section class="roster" aria-label="Color roster">
      <div class="roster-meta" id="roster-meta">Loading...</div>
      <div class="grid" id="grid"></div>
    </section>
    <aside class="showcase" aria-label="Selected color">
      <div class="showcase-tag">PREVIEW</div>
      <div class="hero" id="hero"></div>
      <h2 class="name" id="name"></h2>
      <div class="family" id="family"></div>
      <div class="codes" id="codes"></div>
      <details class="type-fold" id="type-fold" hidden>
        <summary>Typography</summary>
        <div class="type-body" id="type-body"></div>
      </details>
      <button type="button" class="copy" id="copy">COPY HEX</button>
      <p class="hint" id="hint">Arrow keys move selection when roster is focused</p>
      <p class="pack-source" id="pack-source" hidden></p>
    </aside>
  </div>
</div>

  const WHITE_NAMES = new Set(["white","snow","ivory","ghostwhite","whitesmoke","floralwhite","linen","seashell","mintcream","honeydew","azure","aliceblue","beige","antiquewhite","oldlace","cornsilk","blanchedalmond","lavenderblush","mistyrose","gainsboro","lightgray","silver","darkgray","gray","dimgray","lightslategray","slategray"]);
  const BROWN_NAMES = new Set(["brown","chocolate","saddlebrown","sienna","maroon","peru","tan","sandybrown","rosybrown","burlywood","wheat","goldenrod","darkkhaki"]);

  function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const c = (1 - Math.abs(2 * l - 1)) * s;
    const x = c * (1 - Math.abs((h / 60) % 2 - 1));
    const m = l - c / 2;
    let r = 0, g = 0, b = 0;
    if (h < 60) { r = c; g = x; }
    else if (h < 120) { r = x; g = c; }
    else if (h < 180) { g = c; b = x; }
    else if (h < 240) { g = x; b = c; }
    else if (h < 300) { r = x; b = c; }
    else { r = c; b = x; }
    const hx = (n) => Math.round((n + m) * 255).toString(16).padStart(2, "0");
    return "#" + hx(r) + hx(g) + hx(b);

  function hueFamily(h) {
    if (h < 15 || h >= 345) return "Red";
    if (h < 45) return "Orange";

    if (h < 195) return "Cyan";
    if (h < 255) return "Blue";
    if (h < 290) return "Purple";
    if (h < 345) return "Pink";
    return "Red";
  }
  function hexToRgb(hex) {
    let h = hex.replace("#", "");
    if (h.length === 3) h = h.split("").map((c) => c + c).join("");
    const n = parseInt(h, 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }
  function rgbToHsl(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, l = (max + min) / 2;
    if (max === min) h = s = 0;
    else {
      const d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      switch (max) {
        case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
        case g: h = ((b - r) / d + 2) / 6; break;
        default: h = ((r - g) / d + 4) / 6;
      }
    }
    return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
  }
  function labelLight(hex) {
    const [r, g, b] = hexToRgb(hex).map((v) => {
      v /= 255;
      return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
    });
    return 0.2126 * r + 0.7152 * g + 0.0722 * b > 0.45;
  }
  function normHex(hex) {
    return hex.startsWith("#") ? hex.toLowerCase() : ("#" + hex).toLowerCase();
  }
  function buildBasePalette() {
    const seen = new Set();
    const out = [];
    function add(name, hex, family) {
      const key = normHex(hex);
      if (seen.has(key)) return;
      seen.add(key);
      out.push({ name, hex: key, family });
    }
    NAMED.forEach(([name, hex]) => {
      const [r, g, b] = hexToRgb(hex);
      const [h] = rgbToHsl(r, g, b);
      let fam = hueFamily(h);
      if (name === "black" || name === "darkslategray") fam = "Gray";
      else if (WHITE_NAMES.has(name)) fam = "White";
      else if (BROWN_NAMES.has(name)) fam = "Brown";
      add(name, hex, fam);
    });
    for (let h = 0; h < 360; h += 12) {
      [28, 42, 55, 68, 82].forEach((l) => add("H" + h + " L" + l, hslToHex(h, 74, l), hueFamily(h)));
    }
    [
      ["Archive bg","#090b10","Archive"],["Archive surface","#141a26","Archive"],
      ["Archive text","#e9eef6","Archive"],["Archive muted","#9aa6b8","Archive"],
      ["Archive accent","#45d2ff","Archive"],["Archive accent 2","#1f9ad6","Archive"],
      ["Archive danger","#ff6b6b","Archive"],["Archive gold pick","#ffd54a","Archive"]
    ].forEach(([n, h, f]) => add(n, h, f));
    [
      ["Neon pink","#ff10f0","Neon"],["Neon green","#39ff14","Neon"],["Neon cyan","#00fff7","Neon"],
      ["Neon orange","#ff5f1f","Neon"],["Neon yellow","#ffff33","Neon"],["Neon purple","#bc13fe","Neon"],
      ["Neon blue","#04d9ff","Neon"],["Neon red","#ff073a","Neon"],["Electric lime","#ccff00","Neon"],
      ["Hot magenta","#ff006e","Neon"]
    ].forEach(([n, h, f]) => add(n, h, f));
    return out.sort((a, b) => a.family.localeCompare(b.family) || a.name.localeCompare(b.name));
  }

  const BASE_PACK = {
    id: "base",
    name: "Base",
    icon: "assets/dlc/base-colors-icon.png",
    subtitle: "SELECT YOUR SHADE",
    layout: "grid",
    theme: {
      accent: "#45d2ff",
      highlight: "#ffd54a",
      text: "#e9eef6",
      muted: "#6b7686",
      bgGradient: "radial-gradient(ellipse 100% 60% at 50% -10%, rgba(30, 58, 95, 0.85) 0%, transparent 55%), radial-gradient(ellipse 80% 50% at 100% 100%, rgba(69, 210, 255, 0.06) 0%, transparent 50%), #050608"
    },
    colors: buildBasePalette()
  };

  let packs = [BASE_PACK];
  let activePack = BASE_PACK;
  let filter = "All";
  let query = "";
  let visible = [];
  let selIdx = 0;

  const screenEl = document.getElementById("screen");
  const dlcBarEl = document.getElementById("dlc-bar");
  const tabsEl = document.getElementById("tabs");
  const gridEl = document.getElementById("grid");
  const searchEl = document.getElementById("search");
  const controlsEl = document.getElementById("controls");

  function palette() { return activePack.colors; }

  function families() {
    return ["All", ...Array.from(new Set(palette().map((c) => c.family))).sort()];
  }

  function filtered() {
    return palette().filter((c) => {
      if (filter !== "All" && c.family !== filter) return false;
      if (!query) return true;
      const q = query.toLowerCase();
      return c.name.toLowerCase().includes(q) || c.hex.includes(q);
    });
  }

  function selected() { return visible[selIdx] || visible[0]; }

  function resolveIcon(path) {
    if (!path) return "";
    if (/^https?:\/\//i.test(path)) return path;
    const clean = path.replace(/^\//, "");
    return "../" + clean;
  }

  function applyTheme(pack) {
    const t = pack.theme || {};
    document.documentElement.style.setProperty("--cl-accent", t.accent || "#45d2ff");
    document.documentElement.style.setProperty("--cl-highlight", t.highlight || "#ffd54a");
    document.documentElement.style.setProperty("--cl-text", t.text || "#e9eef6");
    document.documentElement.style.setProperty("--cl-muted", t.muted || "#6b7686");
    if (t.bgGradient) screenEl.style.background = t.bgGradient;
    const headIcon = document.getElementById("head-icon");
    if (pack.icon) {
      headIcon.hidden = false;
      headIcon.onerror = () => { headIcon.hidden = true; };
      headIcon.src = resolveIcon(pack.icon);
      headIcon.alt = pack.name + " icon";
    } else {
      headIcon.hidden = true;
      headIcon.removeAttribute("src");
    }
    document.getElementById("head-title").textContent =
      pack.id === "base" ? "COLOR LIBRARY" : pack.name.toUpperCase();
    document.getElementById("head-sub").textContent = pack.subtitle || "SELECT YOUR SHADE";
    const srcEl = document.getElementById("pack-source");
    if (pack.source) {
      srcEl.hidden = false;
      srcEl.textContent = pack.source;
    } else {
      srcEl.hidden = true;
    }
    renderTypography(pack);
  }

  function loadDlcFonts(url) {
    if (!url) return;
    let link = document.getElementById("dlc-fonts");
    if (!link) {
      link = document.createElement("link");
      link.id = "dlc-fonts";
      link.rel = "stylesheet";
      document.head.appendChild(link);
    }
    if (link.href !== url) link.href = url;
  }

  function renderTypography(pack) {
    const fold = document.getElementById("type-fold");
    const body = document.getElementById("type-body");
    const ty = pack.typography;
    if (!ty || !ty.roles || !ty.roles.length) {
      fold.hidden = true;
      body.innerHTML = "";
      return;
    }
    fold.hidden = false;
    loadDlcFonts(ty.googleFonts || "");
    let html = "";
    if (ty.primary) {
      html += "<div class='type-primary' style='" + escHtml((ty.roles[0] && ty.roles[0].css) || "") + "'>" +
        escHtml(ty.primary) + "</div>";
    }
    ty.roles.forEach((r) => {
      html += "<div class='type-row'>" +
        "<div class='type-role'>" + escHtml(r.role) + "</div>" +
        "<div class='type-spec'>" + escHtml(r.spec) + "</div>" +
        "<div class='type-sample' style='" + escHtml(r.css || "") + "'>" + escHtml(r.sample || r.spec) + "</div>" +
        "</div>";
    });
    if (ty.alternates && ty.alternates.length) {
      html += "<div class='type-alts'><div class='type-alts-label'>Alternative charsets</div>";
      ty.alternates.forEach((a) => {
        html += "<div class='type-alt'>" + escHtml(a.locale) + ": " + escHtml(a.font) + "</div>";
      });
      html += "</div>";
    }
    body.innerHTML = html;
    if (ty.source) {
      const note = document.createElement("p");
      note.className = "pack-source";
      note.style.marginTop = "8px";
      note.textContent = ty.source;
      body.appendChild(note);
    }
  }

  function colorCodesHtml(c) {
    const rgb = c.rgb || hexToRgb(c.hex);
    const [h, s, l] = rgbToHsl(rgb[0], rgb[1], rgb[2]);
    let html =
      "<b>hex</b> " + c.hex + "<br><b>rgb</b> rgb(" + rgb.join(", ") + ")<br>" +
      "<b>hsl</b> hsl(" + h + ", " + s + "%, " + l + "%)";
    if (c.cmyk) html += "<br><b>cmyk</b> " + c.cmyk.join(" ") + "%";
    if (c.role) html += "<br><b>role</b> " + c.role;
    return html;
  }

  function renderShowcase() {
    const c = selected();
    if (!c) return;
    document.getElementById("hero").style.background = c.hex;
    document.getElementById("name").textContent = c.name;
    document.getElementById("family").textContent = c.family + (activePack.id !== "base" ? " / " + activePack.name : "");
    document.getElementById("codes").innerHTML = colorCodesHtml(c);
    document.getElementById("roster-meta").textContent =
      activePack.name.toUpperCase() + " / " + visible.length + " shown / " + palette().length + " total";
  }

  function selectIndex(i) {
    if (!visible.length) return;
    selIdx = Math.max(0, Math.min(i, visible.length - 1));
    renderGrid();
    renderShowcase();
  }

  function renderDlcBar() {
    dlcBarEl.querySelectorAll(".dlc-btn").forEach((el) => el.remove());
    packs.forEach((p) => {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "dlc-btn" + (activePack.id === p.id ? " on" : "");
      let inner = "";
      if (p.icon) {
        inner += "<img class='dlc-icon' src='" + escHtml(resolveIcon(p.icon)) + "' alt='' onerror='this.style.display=\"none\"' />";
      }
      inner += "<span>" + escHtml(p.name) + "</span>";
      if (p.badge) inner += "<span class='badge'>" + escHtml(p.badge) + "</span>";
      b.innerHTML = inner;
      b.onclick = () => switchPack(p);
      dlcBarEl.appendChild(b);
    });
  }

  function escHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;");
  }

  function switchPack(p) {
    activePack = p;
    filter = "All";
    query = "";
    selIdx = 0;
    searchEl.value = "";
    applyTheme(p);
    renderDlcBar();
    renderTabs();
    renderGrid();
  }

  function renderTabs() {
    tabsEl.innerHTML = "";
    families().forEach((f) => {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "tab" + (filter === f ? " on" : "");
      b.textContent = f;
      b.onclick = () => { filter = f; selIdx = 0; renderGrid(); renderTabs(); };
      tabsEl.appendChild(b);
    });
  }

  function renderGrid() {
    visible = filtered();
    if (selIdx >= visible.length) selIdx = 0;
    gridEl.innerHTML = "";
    visible.forEach((c, i) => {
      const cell = document.createElement("button");
      cell.type = "button";
      cell.className = "cell" + (i === selIdx ? " on" : "");
      cell.style.background = "linear-gradient(180deg, " + c.hex + " 0%, " + c.hex + "bb 100%)";
      cell.title = c.name + " " + c.hex;
      const lbl = document.createElement("span");
      lbl.className = "lbl";
      lbl.textContent = c.name;
      const light = labelLight(c.hex);
      lbl.style.color = light ? "#04121b" : "#fff";
      lbl.style.textShadow = light ? "none" : "0 1px 2px #000";
      cell.appendChild(lbl);
      cell.onclick = () => { selIdx = i; renderGrid(); renderShowcase(); };
      gridEl.appendChild(cell);
    });
    renderShowcase();
  }

  document.getElementById("copy").onclick = async () => {
    const c = selected();
    if (!c) return;
    const btn = document.getElementById("copy");
    try {
      await navigator.clipboard.writeText(c.hex);
      btn.textContent = "COPIED!";
      btn.classList.add("ok");
      setTimeout(() => { btn.textContent = "COPY HEX"; btn.classList.remove("ok"); }, 1200);
    } catch (_) {
      btn.textContent = c.hex;
    }
  };

  searchEl.addEventListener("input", () => {
    query = searchEl.value.trim();
    selIdx = 0;
    renderGrid();
  });
  gridEl.tabIndex = 0;
  gridEl.addEventListener("keydown", (e) => {
    const cols = Math.max(1, Math.floor(gridEl.clientWidth / 64));
    if (e.key === "ArrowRight") { e.preventDefault(); selectIndex(selIdx + 1); }
    else if (e.key === "ArrowLeft") { e.preventDefault(); selectIndex(selIdx - 1); }
    else if (e.key === "ArrowDown") { e.preventDefault(); selectIndex(selIdx + cols); }
    else if (e.key === "ArrowUp") { e.preventDefault(); selectIndex(selIdx - cols); }
    else if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      document.getElementById("copy").click();
    }
  });

  async function init() {
    try {
      const res = await fetch("../data/color-dlc.json", { cache: "no-store" });
      if (res.ok) {
        const data = await res.json();
        (data.packs || []).forEach((p) => {
          packs.push({
            id: p.id,
            name: p.name,
            badge: p.badge || "DLC",
            icon: p.icon || "",
            subtitle: p.subtitle || p.name.toUpperCase(),
            source: p.source || "",
            layout: "grid",
            theme: p.theme || {},
            typography: p.typography || null,
            colors: (p.colors || []).map((c) => ({
              name: c.name,
              hex: normHex(c.hex),
              family: c.family || "All",
              role: c.role,
              rgb: c.rgb,
              cmyk: c.cmyk
            }))
          });
        });
      }
    } catch (_) { /* base only offline */ }
    applyTheme(BASE_PACK);
    renderDlcBar();
    renderTabs();
    visible = filtered();
    selIdx = visible.findIndex((c) => c.hex === "#45d2ff");
    if (selIdx < 0) selIdx = 0;
    renderGrid();
  }

  init();
})();
</script>
</body>
</html>
