<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Lambda // Index</title>
<meta name="description" content="A growing reference archive. Filed by Lambda." />
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js" defer></script>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

<header class="topbar" id="topbar">
  <a class="brand" href="#/" aria-label="Lambda Index home">
    <svg class="prism" viewBox="0 0 24 24" width="30" height="30" aria-hidden="true">
      <path class="prism-edge" d="M12 3 L21 20 L3 20 Z" fill="none" />
      <path class="prism-core" d="M12 9 L15.6 15 L8.4 15 Z" />
    </svg>
    <span class="wordmark">Lambda <span class="slash">//</span> Index</span>
  </a>
  <div class="topbar-status">
    <span id="entry-count" class="count">0 entries</span>
  </div>
</header>

<main id="main" class="shell">

  <section id="index-view" class="view" aria-label="Archive index">
    <p class="greeting" id="greeting" aria-live="polite"></p>

    <div class="searchbar">
      <svg class="search-ico" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="11" cy="11" r="7" fill="none"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      <input id="search" type="search" placeholder="Search the archive" aria-label="Search the archive" autocomplete="off" />
    </div>

    <div id="chips" class="chips" role="group" aria-label="Filter by category"></div>

    <div id="grid" class="grid" aria-live="polite"></div>
  </section>

  <section id="reader-view" class="view" hidden aria-label="Entry reader"></section>

  <section id="tool-view" class="view tool-view" hidden aria-label="Tool"></section>

  <section id="log-view" class="view" hidden aria-label="Session log"></section>

  <p id="boot-error" class="boot-error" hidden></p>
</main>

<footer class="footer">
  <div class="footer-left">
    <span>Lambda // Index</span>
    <span class="footer-line">The archive grows. It does not forget.</span>
  </div>
  <a class="footer-log" href="#/log"><svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" style="vertical-align:-2px;margin-right:5px"><path d="M5 4h14v16H5z M8 8h8 M8 12h8 M8 16h5" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>Log</a>
</footer>

<script src="js/engine.js" defer></script>
</body>
</html>
